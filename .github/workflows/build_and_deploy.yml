name: Deploy snowpark app

on:
  push:
    branches:
      - main
  

  workflow dispatch:

jobs:
  deploy:
    runs on: unbuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          repository: Abhishek-s-git/snowpark_poc
          ref: main
      
      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Deploy Snowpark apps
        working-directory: snowpark_project
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WARESHOUSE: ${{ secrets.SNOWFLAKE_WARESHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: python deploy_snowpark_app.py $GITHUB_WORKSPACE