definition_version: "1.1"

snowpark:
  project_name: "my_snowpark_project"

  # REQUIRED: Fix runtime (this solves your error)
  runtime: python3.9

  stage_name: "dev_deployment"

  src: "app/"

  functions:
    - name: hello_function
      handler: "functions.hello_function"
      signature:
        - name: "name"
          type: "string"
      returns: string

  procedures:
    - name: hello_procedure
      handler: "procedures.hello_procedure"
      signature:
        - name: "name"
          type: "string"
      returns: string

    - name: test_procedure
      handler: "procedures.test_procedure"
      signature: []   #FIXED
      returns: string
